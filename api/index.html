<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaigonPropTech — Dự đoán giá thuê</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }
  .header { background: #0F6E56; color: white; padding: 20px 32px; }
  .header h1 { font-size: 22px; }
  .header p  { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .container { max-width: 860px; margin: 32px auto; padding: 0 16px; }
  .card { background: rgb(255, 255, 255); border-radius: 12px; padding: 28px;
          margin-bottom: 24px; box-shadow: 0 1px 4px rgba(97, 63, 63, 0.08); }
  .card h2 { font-size: 16px; color: #0F6E56; margin-bottom: 20px;
             padding-bottom: 10px; border-bottom: 1px solid #eee; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; color: #555; font-weight: 500; }
  input, select { padding: 10px 12px; border: 1px solid #ddd;
                  border-radius: 8px; font-size: 14px; outline: none; }
  input:focus, select:focus { border-color: #0F6E56; }
  .amenity-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 4px; }
  .amenity-item { display: flex; align-items: center; gap: 8px;
                  padding: 8px 12px; border: 1px solid #eee;
                  border-radius: 8px; cursor: pointer; font-size: 13px; }
  .amenity-item input[type=checkbox] { width: 16px; height: 16px;
                                        accent-color: #0F6E56; cursor: pointer; }
  .amenity-item:has(input:checked) { background: #e8f5ee; border-color: #0F6E56; color: #0F6E56; }
  .btn { width: 100%; padding: 14px; background: #0F6E56; color: white;
         border: none; border-radius: 8px; font-size: 16px;
         cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #085041; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .result { display: none; }
  .result.show { display: block; }
  .price-main { font-size: 42px; font-weight: bold; color: #0F6E56; text-align: center; }
  .price-unit { font-size: 16px; color: #666; text-align: center; margin-top: 4px; }
  .price-range { display: flex; justify-content: center; gap: 32px; margin-top: 16px; }
  .range-item { text-align: center; }
  .range-item .val { font-size: 20px; font-weight: 600; color: #378ADD; }
  .range-item .lbl { font-size: 12px; color: #999; margin-top: 2px; }
  .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .meta-item { background: #f5f5f5; border-radius: 8px; padding: 12px; font-size: 13px; }
  .meta-item .k { color: #999; }
  .meta-item .v { font-weight: 600; margin-top: 2px; }
  .loading { text-align: center; padding: 24px; color: #666; display: none; }
  .error { background: #fff0f0; border: 1px solid #fcc; border-radius: 8px;
           padding: 16px; color: #c00; display: none; }
  @media (max-width: 600px) {
    .form-grid, .amenity-grid { grid-template-columns: 1fr 1fr; }
    .price-range { gap: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>SaigonPropTech — Dự đoán giá thuê phòng trọ</h1>
  <p>Nhập thông tin phòng để nhận giá dự đoán từ mô hình Machine Learning</p>
</div>

<div class="container">
  <div class="card">
    <h2>Thông tin cơ bản</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Địa chỉ (số nhà, tên đường, phường)</label>
        <input type="text" id="address"
               placeholder="VD: 123 Nguyễn Trãi, Phường 2">
      </div>
      <div class="form-group">
        <label>Quận / Huyện</label>
        <select id="district_id">
          <option value="1">Quận 1</option>
          <option value="2">Quận 2</option>
          <option value="3">Quận 3</option>
          <option value="4">Quận 4</option>
          <option value="5">Quận 5</option>
          <option value="6">Quận 6</option>
          <option value="7" selected>Quận 7</option>
          <option value="8">Quận 8</option>
          <option value="9">Quận 9</option>
          <option value="10">Quận 10</option>
          <option value="11">Quận 11</option>
          <option value="12">Quận 12</option>
          <option value="13">Bình Thạnh</option>
          <option value="14">Bình Tân</option>
          <option value="15">Gò Vấp</option>
          <option value="16">Phú Nhuận</option>
          <option value="17">Tân Bình</option>
          <option value="18">Tân Phú</option>
          <option value="19">Thủ Đức</option>
          <option value="20">Bình Chánh</option>
          <option value="21">Hóc Môn</option>
          <option value="22">Nhà Bè</option>
          <option value="23">Cần Giờ</option>
          <option value="24">Củ Chi</option>
        </select>
      </div>
      <div class="form-group">
        <label>Diện tích (m²)</label>
        <input type="number" id="area_m2" value="25" min="6" max="80">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Tiện ích</h2>
    <div class="amenity-grid">
      <label class="amenity-item">
        <input type="checkbox" id="has_ac"> Máy lạnh
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_wc"> WC riêng
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_furniture"> Nội thất đầy đủ
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_kitchen"> Bếp / Kệ bếp
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_washer"> Máy giặt
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_fridge"> Tủ lạnh
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_elevator"> Thang máy
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_basement"> Hầm để xe
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_balcony"> Ban công
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_security"> Bảo vệ 24/24
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="has_parking"> Chỗ để xe
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="no_owner"> Không chung chủ
      </label>
      <label class="amenity-item">
        <input type="checkbox" id="free_hours"> Giờ giấc tự do
      </label>
    </div>

    <button class="btn" id="btn" onclick="predict()">
      Dự đoán giá thuê
    </button>
  </div>

  <div class="loading" id="loading">
    Đang phân tích và dự đoán...
  </div>

  <div class="error" id="error"></div>

  <div class="card result" id="result">
    <h2>Kết quả dự đoán</h2>
    <div class="price-main" id="price-main">—</div>
    <div class="price-unit">triệu VNĐ / tháng</div>
    <div class="price-range">
      <div class="range-item">
        <div class="val" id="price-low">—</div>
        <div class="lbl">Thấp nhất</div>
      </div>
      <div class="range-item">
        <div class="val" id="price-high">—</div>
        <div class="lbl">Cao nhất</div>
      </div>
    </div>
    <div class="meta">
      <div class="meta-item">
        <div class="k">Khu vực</div>
        <div class="v" id="meta-district">—</div>
      </div>
      <div class="meta-item">
        <div class="k">Tọa độ (tự động)</div>
        <div class="v" id="meta-coords">—</div>
      </div>
    </div>
  </div>
</div>

<script>
async function predict() {
  const btn     = document.getElementById("btn");
  const loading = document.getElementById("loading");
  const error   = document.getElementById("error");
  const result  = document.getElementById("result");

  const address = document.getElementById("address").value.trim();
  if (!address) { alert("Vui lòng nhập địa chỉ!"); return; }

  btn.disabled      = true;
  loading.style.display = "block";
  error.style.display   = "none";
  result.classList.remove("show");

  const body = {
    address:       address,
    district_id:   parseInt(document.getElementById("district_id").value),
    area_m2:       parseFloat(document.getElementById("area_m2").value),
    has_ac:        document.getElementById("has_ac").checked ? 1 : 0,
    has_wc:        document.getElementById("has_wc").checked ? 1 : 0,
    has_furniture: document.getElementById("has_furniture").checked ? 1 : 0,
    has_kitchen:   document.getElementById("has_kitchen").checked ? 1 : 0,
    has_washer:    document.getElementById("has_washer").checked ? 1 : 0,
    has_fridge:    document.getElementById("has_fridge").checked ? 1 : 0,
    has_elevator:  document.getElementById("has_elevator").checked ? 1 : 0,
    has_basement:  document.getElementById("has_basement").checked ? 1 : 0,
    has_balcony:   document.getElementById("has_balcony").checked ? 1 : 0,
    has_security:  document.getElementById("has_security").checked ? 1 : 0,
    has_parking:   document.getElementById("has_parking").checked ? 1 : 0,
    no_owner:      document.getElementById("no_owner").checked ? 1 : 0,
    free_hours:    document.getElementById("free_hours").checked ? 1 : 0,
  };

  try {
    const resp = await fetch("/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body),
    });
    const data = await resp.json();

    document.getElementById("price-main").textContent  = data.price_million.toFixed(2);
    document.getElementById("price-low").textContent   = data.price_range.low.toFixed(2) + "M";
    document.getElementById("price-high").textContent  = data.price_range.high.toFixed(2) + "M";
    document.getElementById("meta-district").textContent = data.district_name;
    document.getElementById("meta-coords").textContent =
      `${data.geocoded.lat.toFixed(4)}, ${data.geocoded.lng.toFixed(4)}`;

    result.classList.add("show");
  } catch (e) {
    error.textContent     = "Lỗi kết nối API. Kiểm tra server đang chạy không.";
    error.style.display   = "block";
  }

  btn.disabled          = false;
  loading.style.display = "none";
}
</script>
</body>
</html>
